<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lucas Bredin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@600;800&family=DM+Sans:wght@300;400;500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: linear-gradient(135deg, #e8f0fe 0%, #f0f4ff 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .carte {
    background: white;
    border-radius: 24px;
    padding: 2rem 1.5rem;
    max-width: 380px;
    width: 100%;
    text-align: center;
    box-shadow: 0 8px 32px rgba(30, 64, 175, 0.1);
    opacity: 0;
    transform: translateY(24px);
    animation: apparition 0.6s ease forwards;
  }

  @keyframes apparition {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .avatar {
    width: 88px;
    height: 88px;
    border-radius: 50%;
    overflow: hidden;
    display: inline-block;
    margin-bottom: 1rem;
    border: 3px solid #e8f0fe;
    box-shadow: 0 4px 16px rgba(30, 64, 175, 0.15);
  }

  .avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 35%;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 22px;
    color: #1a1a2e;
  }

  .tagline {
    font-size: 13px;
    color: #6b7ab5;
    margin-top: 4px;
    margin-bottom: 1.5rem;
    font-weight: 400;
  }

  .onglets {
    display: flex;
    background: #f0f4ff;
    border-radius: 10px;
    padding: 4px;
    gap: 4px;
    margin-bottom: 1.25rem;
  }

  .onglets button {
    flex: 1;
    padding: 8px;
    border: none;
    background: transparent;
    border-radius: 7px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: #6b7ab5;
    cursor: pointer;
    transition: all 0.2s;
  }

  .onglets button.actif {
    background: white;
    color: #1e40af;
    box-shadow: 0 1px 4px rgba(30, 64, 175, 0.12);
  }

  #pro, #perso {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  #perso { display: none; }

  #pro a, #perso a {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    background: #f0f4ff;
    border-radius: 12px;
    text-decoration: none;
    color: #1a1a2e;
    font-size: 18px;
    transition: background 0.18s, transform 0.15s;
    opacity: 0;
    animation: glissement 0.4s ease forwards;
  }

  #pro a:nth-child(1) { animation-delay: 0.15s; }
  #pro a:nth-child(2) { animation-delay: 0.25s; }
  #pro a:nth-child(3) { animation-delay: 0.35s; }
  #perso a:nth-child(1) { animation-delay: 0.15s; }

  @keyframes glissement {
    from { opacity: 0; transform: translateX(-12px); }
    to { opacity: 1; transform: translateX(0); }
  }

  #pro a:hover, #perso a:hover {
    background: #dce6fd;
    transform: translateX(3px);
  }

  #pro a i:first-child, #perso a i:first-child {
    color: #1e40af;
    width: 20px;
    text-align: center;
  }

  .link-text {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 2px;
    text-align: left;
  }

  .link-label {
    font-size: 14px;
    font-weight: 500;
    color: #1a1a2e;
  }

  .link-sub {
    font-size: 11px;
    color: #6b7ab5;
    font-weight: 300;
  }

  .fa-chevron-right {
    font-size: 12px;
    color: #bbb;
  }
</style>
</head>
<body>
<div class="carte">

  <div class="avatar">
    <img src="photo.jpg" alt="Lucas Bredin">
  </div>
  <h1>Lucas Bredin</h1>
  <p class="tagline">Ingénieur en maîtrise énergétique · France</p>

  <div class="onglets">
    <button onclick="afficher('pro')" id="btn-pro" class="actif">Professionnel</button>
    <button onclick="afficher('perso')" id="btn-perso">Personnel</button>
  </div>

  <div id="pro">
    <a href="https://www.linkedin.com/in/lucas-bredin">
      <i class="fa-brands fa-linkedin"></i>
      <span class="link-text">
        <span class="link-label">LinkedIn</span>
        <span class="link-sub">linkedin.com/in/lucas-bredin</span>
      </span>
      <i class="fa-solid fa-chevron-right"></i>
    </a>
    <a href="mailto:lucasbredin@gmail.com">
      <i class="fa-solid fa-envelope"></i>
      <span class="link-text">
        <span class="link-label">Email</span>
        <span class="link-sub">lucasbredin@gmail.com</span>
      </span>
      <i class="fa-solid fa-chevron-right"></i>
    </a>
    <a href="tel:+33767911697">
      <i class="fa-solid fa-phone"></i>
      <span class="link-text">
        <span class="link-label">Téléphone</span>
        <span class="link-sub">+33 7 67 91 16 97</span>
      </span>
      <i class="fa-solid fa-chevron-right"></i>
    </a>
  </div>

  <div id="perso">
    <a href="https://instagram.com/lucas_brdn">
      <i class="fa-brands fa-instagram"></i>
      <span class="link-text">
        <span class="link-label">Instagram</span>
        <span class="link-sub">@lucas_brdn</span>
      </span>
      <i class="fa-solid fa-chevron-right"></i>
    </a>
  </div>

</div>

<script>
  function afficher(onglet) {
    document.getElementById('pro').style.display = onglet === 'pro' ? 'flex' : 'none';
    document.getElementById('perso').style.display = onglet === 'perso' ? 'flex' : 'none';
    document.getElementById('btn-pro').className = onglet === 'pro' ? 'actif' : '';
    document.getElementById('btn-perso').className = onglet === 'perso' ? 'actif' : '';
  }
</script>
</body>
</html>
